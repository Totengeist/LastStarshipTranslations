name: Nightly

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - LICENSE

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Use base64 README
      run: |
        rm README.md
        mv README-base64.md README.md

    - name: Package latest translations
      run: |
        version=`cat version`
        cp ../README.md ./README.md
        zip -r -v ../LastStarshipTranslations_nightly.zip data/ README.md
        unzip -l ../LastStarshipTranslations_nightly.zip
      working-directory: ./latest

    - name: List files
      run: ls -R

    - name: Update git tag
      run: |
        git tag -f nightly
        git push -f origin nightly

    - name: Update nightly release
      uses: ncipollo/release-action@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: "LastStarshipTranslations_nightly.zip"
        tag: "nightly"
        commit: ${{ github.ref_name }}
        prerelease: true
        allowUpdates: true
        updateOnlyUnreleased: true
        removeArtifacts: true